<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 p-6 font-sans">

    <main class="max-w-3xl mx-auto">

      <!-- INPUT SECTION -->
      <section id="input_section" class="bg-white p-4 rounded shadow mb-6 space-y-3">

        <div class="flex flex-col">
          <label for="studentInput" class="text-sm font-medium">Name</label>
          <input type="text" id="studentInput"
            class="border p-2 rounded focus:outline-none focus:ring"
            placeholder="write your name" />
        </div>

        <div class="flex flex-col">
          <label for="fatherInput" class="text-sm font-medium">Father Name</label>
          <input type="text" id="fatherInput"
            class="border p-2 rounded focus:outline-none focus:ring"
            placeholder="write your father name" />
        </div>

        <button id="submitBtn"
          class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition">
          Add
        </button>

      </section>

      <!-- LIST -->
      <section class="bg-white p-4 rounded shadow">
        <ul id="studentList" class="space-y-2"></ul>
      </section>

    </main>

    <script>
      const studentInput = document.getElementById("studentInput");
      const fatherInput = document.getElementById("fatherInput");
      const submitBtn = document.getElementById("submitBtn");
      const studentList = document.getElementById("studentList");

      let isEditMode = false;
      let currentStudentItem = null;
      let currentFatherItem = null;

      let cancel_btn = document.createElement("button");
      cancel_btn.textContent = "cancel";
      cancel_btn.className =
        "ml-3 bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600";

      submitBtn.addEventListener("click", handleSubmit);

      function handleSubmit() {
        let studentValue = studentInput.value.trim();
        let fatherValue = fatherInput.value.trim();

        if (!studentValue || !fatherValue) {
          alert("input fields cannot be empty");
          return;
        }

        const regex = /^[A-Za-z ]+$/;
        if (!regex.test(studentValue) || !regex.test(fatherValue)) {
          alert("only english letters are allowed.");
          return;
        }

        if (isEditMode) {
          updateRecord(studentValue, fatherValue);
        } else {
          createRecord(studentValue, fatherValue);
        }

        clearInputs();
      }

      let std_head = document.createElement("h2");
      std_head.textContent = "Student";
      std_head.className = "font-bold";

      let father_head = document.createElement("h2");
      father_head.textContent = "Father";
      father_head.className = "font-bold";

      let head = document.createElement("div");
      head.className = "flex gap-10 mb-2";
      head.appendChild(std_head);
      head.appendChild(father_head);

      function createRecord(studentValue, fatherValue) {
        let studentItem = document.createElement("li");
        studentItem.className =
          "flex items-center justify-between bg-gray-50 p-3 rounded";

        let student_name = document.createElement("p");
        student_name.textContent = studentValue;

        let father_name = document.createElement("p");
        father_name.textContent = fatherValue;

        let editBtn = document.createElement("button");
        editBtn.textContent = "Edit";
        editBtn.className =
          "bg-yellow-400 px-3 py-1 rounded hover:bg-yellow-500";

        let deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";
        deleteBtn.className =
          "bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600 ml-2";

        let container = document.createElement("div");
        container.className = "flex items-center gap-6";

        editBtn.addEventListener("click", () => {
          enableEditMode(student_name, father_name);
        });

        deleteBtn.addEventListener("click", () => {
          deleteRecord(studentItem, student_name);
        });

        if (studentList.querySelectorAll("li").length == 0) {
          studentList.appendChild(head);
        }

        container.appendChild(student_name);
        container.appendChild(father_name);
        container.appendChild(editBtn);
        container.appendChild(deleteBtn);

        studentItem.appendChild(container);
        studentList.appendChild(studentItem);
      }

      function enableEditMode(student_name, father_name) {
        isEditMode = true;
        currentStudentItem = student_name;
        currentFatherItem = father_name;

        studentInput.value = student_name.textContent;
        fatherInput.value = father_name.textContent;

        submitBtn.textContent = "Save Changes";

        document.getElementById("input_section").appendChild(cancel_btn);

        cancel_btn.onclick = cancelButton;
      }

      function cancelButton() {
        cancel_btn.remove();
        resetEditMode();
      }

      function updateRecord(studentValue, fatherValue) {
        currentStudentItem.textContent = studentValue;
        currentFatherItem.textContent = fatherValue;

        cancel_btn.remove();
        resetEditMode();
      }

      function resetEditMode() {
        isEditMode = false;
        currentStudentItem = null;
        currentFatherItem = null;

        submitBtn.textContent = "Add";
        clearInputs();
      }

      function clearInputs() {
        studentInput.value = "";
        fatherInput.value = "";
      }

      function deleteRecord(studentItem, student_name) {
        const confirmed = window.confirm("Are you sure you want to delete this?");

        if (confirmed) {
          const isDeletingSameItem =
            isEditMode && student_name == currentStudentItem;

          if (isDeletingSameItem) {
            resetEditMode();
            cancel_btn.remove();
          }

          studentList.removeChild(studentItem);
        }

        if (studentList.querySelectorAll("li").length == 0) {
          head.remove();
        }
      }
    </script>
  </body>
</html>
